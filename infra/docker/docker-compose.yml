name: worknexus

services:
  postgres:
    image: postgres:17-alpine
    container_name: worknexus-postgres
    environment:
      POSTGRES_USER: worknexus
      POSTGRES_PASSWORD: worknexus
      POSTGRES_DB: worknexus
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worknexus"]
      interval: 5s
      timeout: 3s
      retries: 10
